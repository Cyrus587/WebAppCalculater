<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What I Want Calculator</title>
  <style>
    :root { --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0; --accent:#0f172a; --accent-2:#334155; --good:#065f46; --good-bg:#ecfdf5; --danger:#991b1b; --danger-bg:#fef2f2; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}.title{margin-bottom:18px}.title h1{margin:0 0 6px;font-size:30px;line-height:1.1}.title p{margin:0;color:var(--muted);font-size:14px}
    .grid{display:grid;gap:18px;grid-template-columns:1.2fr .8fr}.card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 1px 2px rgba(15,23,42,.04);overflow:hidden}
    .inputs{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr))}.full{grid-column:1 / -1}label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--accent-2)}input{font-size:inherit}
    .row{display:grid;grid-template-columns:.7fr 1fr 1fr;gap:14px}.buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}button{border:1px solid var(--border);border-radius:14px;padding:10px 14px;cursor:pointer;}
    .result-box{border-radius:18px;background:var(--accent);color:white;padding:18px;margin-bottom:12px}.result-box small{display:block;color:rgba(255,255,255,.7);letter-spacing:.08em;text-transform:uppercase;}
    .saved{margin-top:18px}.saved-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}.saved-list{display:grid;gap:10px}.saved-item{border:1px solid var(--border);padding:12px;border-radius:8px;}
    .status{margin-top:10px;padding:10px 12px;border-radius:14px;font-size:13px;display:none}.status.show{display:block}.status.good{background:var(--good-bg);color:var(--good)}.status.bad{background:var(--danger-bg);color:var(--danger);}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.inputs,.row{grid-template-columns:1fr}.wrap{padding:14px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>What I Want Calculator</h1>
      <p>Use it like a mini solver, save calculations on your phone, and copy the values into Google Forms later.</p>
    </div>
    <div class="grid">
      <section class="card">
        <div class="card-head"><h2>Calculator</h2></div>
        <div class="card-body">
          <div class="inputs">
            <div><label for="item">Item label</label><input id="item" placeholder="Shoes, tattoo, headphones..." /></div>
            <div><label for="solveFor">Solve for</label><select id="solveFor"><option value="time">Time to reach</option><option value="rateDollar">Dollar rate needed</option><option value="ratePercent">Rate in percent</option></select></div>
            <div><label for="price">Price</label><input id="price" type="number" step="any" value="245.65" /></div>
            <div><label for="rateDollar">Rate in dollars</label><input id="rateDollar" type="number" step="any" value="14.74" /></div>
            <div><label for="ratePercent">Rate in percent</label><input id="ratePercent" type="number" step="any" placeholder="Optional" /></div>
            <div class="full row">
              <div><label for="periodAmount">Period amount</label><input id="periodAmount" type="number" step="any" value="1" /></div>
              <div><label for="periodUnit">Earning period</label><select id="periodUnit"><option value="day">day</option><option value="week">week</option><option value="month">month</option><option value="year">year</option></select></div>
              <div><label for="showUnit">Show result in</label><select id="showUnit"><option value="day">day</option><option value="week">week</option><option value="month" selected>month</option><option value="year">year</option></select></div>
            </div>
            <div class="full"><label for="notes">Notes (optional)</label><textarea id="notes" placeholder="Anything you want to remember when you save this..."></textarea></div>
          </div>
          <div class="buttons"><button class="primary" id="saveBtn">Save calculation</button><button id="copyBtn">Copy summary</button><button id="formBtn">Copy values for Form</button><button class="resetBtn">Reset values</button></div>
          <div id="status" class="status"></div>
          <div class="save-note">Saved calculations stay on this device using your browser storage.</div>
        </div>
      </section>
      <section class="card">
        <div class="card-head"><h2>Result</h2></div>
        <div class="card-body"><div class="result-box"><small>Answer</small><div class="answer" id="answer">—</div></div><div class="detail" id="detail">Fill in the calculator to see the result.</div></div>
      </section>
    </div>
    <section class="saved"><div class="saved-head"><h2>Saved calculations</h2><div class="buttons" style="margin-top:0"><button id="exportBtn">Export JSON</button><button id="clearBtn">Clear saved</button></div></div><div class="saved-list" id="savedList"></div></section>
  </div>
  <script>
    const UNIT_TO_DAYS={day:1,week:7,month:30.44,year:365.25},STORAGE_KEY="what_i_want_saved_calculations";
    const els={item:document.getElementById("item"),solveFor:document.getElementById("solveFor"),price:document.getElementById("price"),rateDollar:document.getElementById("rateDollar"),ratePercent:document.getElementById("ratePercent"),periodAmount:document.getElementById("periodAmount"),periodUnit:document.getElementById("periodUnit"),showUnit:document.getElementById("showUnit"),notes:document.getElementById("notes"),answer:document.getElementById("answer"),detail:document.getElementById("detail"),savedList:document.getElementById("savedList"),saveBtn:document.getElementById("saveBtn"),copyBtn:document.getElementById("copyBtn"),formBtn:document.getElementById("formBtn"),resetBtn:document.getElementById("resetBtn"),exportBtn:document.getElementById("exportBtn"),clearBtn:document.getElementById("clearBtn"),status:document.getElementById("status")};
    const n=v=>{const num=Number(v);return Number.isFinite(num)?num:NaN};
    const fmtNum=(v,d=2)=>Number.isFinite(v)?new Intl.NumberFormat("en-US",{maximumFractionDigits:d}).format(v):"—";
    const fmtMoney=v=>Number.isFinite(v)?new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:2}).format(v):"—";
    function getState(){return{item:els.item.value.trim(),solveFor:els.solveFor.value,price:els.price.value,rateDollar:els.rateDollar.value,ratePercent:els.ratePercent.value,periodAmount:els.periodAmount.value,periodUnit:els.periodUnit.value,showUnit:els.showUnit.value,notes:els.notes.value}};
    function calculate(s){const price=n(s.price),rateDollar=n(s.rateDollar),ratePercent=n(s.ratePercent),periodAmount=n(s.periodAmount),periodDays=periodAmount*UNIT_TO_DAYS[s.periodUnit],showDays=UNIT_TO_DAYS[s.showUnit];return{answer:fmtMoney((price*periodDays)/(showDays*(rateDollar*(1+(ratePercent/100))))),detail:"Fill in the calculator to see the result."}};
    function update(){const state=getState(),calc=calculate(state);calc.resultText=calc.answer;els.answer.textContent=calc.answer;els.detail.textContent=calc.detail;}
    els.saveBtn.addEventListener("click",()=>{const state=getState();const items=loadSaved();items.unshift({...state,savedAt:Date.now()});saveSaved(items);renderSaved();showStatus("Saved calculation!");});
    els.copyBtn.addEventListener("click",()=>{const {state,calc}=update();copyText(calc.answer+"\n"+els.detail.textContent)});
    els.exportBtn.addEventListener("click",()=>{const blob=new Blob([JSON.stringify(loadSaved(),null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="saved_calculations.json";document.body.appendChild(a);a.click();document.body.removeChild(a)});
    els.clearBtn.addEventListener("click",()=>{if(!confirm("Clear all saved calculations on this device?"))return;saveSaved([]);renderSaved();showStatus("Saved calculations cleared.");});
    function showStatus(msg,type="good"){els.status.textContent=msg;els.status.className=`status show ${type}`;setTimeout(()=>els.status.className="status",2400)};
    function loadSaved(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}catch{return[]}};
    function saveSaved(items){localStorage.setItem(STORAGE_KEY,JSON.stringify(items))};
    function renderSaved(){const items=loadSaved();els.savedList.innerHTML="";if(!items.length){els.savedList.innerHTML='<div class="saved-item"><div class="meta">No saved calculations yet.</div></div>';return}items.forEach((item,index)=>{const div=document.createElement("div");div.className="saved-item";div.innerHTML=`<div class="meta">Item: ${item.item}, Price: ${fmtMoney(item.price)}, Rate: ${item.rateDollar}, Period: ${item.periodAmount} ${item.periodUnit}</div><div class="buttons"><button data-action="delete" data-index="${index}">Delete</button></div>`;els.savedList.appendChild(div)})};
    update();renderSaved();
  </script>
</body>
</html>
